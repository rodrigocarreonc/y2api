name: CI/CD Pipeline for Laravel 12 to Azure

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  # ==========================================
  # 1. PRUEBAS Y ANÁLISIS ESTÁTICO
  # ==========================================
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql
          coverage: none
          tools: composer

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Set up the database
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --env=testing --force

      - name: Run tests
        run: php artisan test

      - name: Run Laravel Pint
        run: vendor/bin/pint --test

      - name: Run PHPStan (Larastan)
        run: vendor/bin/phpstan analyse --configuration=phpstan.neon

  # ==========================================
  # 2. CONSTRUCCIÓN DEL ARTEFACTO (Producción)
  # ==========================================
  build:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: github.ref == 'refs/heads/main' # Solo se construye si los cambios llegan a main
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Check if composer.json exists
        id: check_files
        uses: andstor/file-existence-action@v1
        with:
          files: 'composer.json'

      - name: Run composer install for production
        if: steps.check_files.outputs.files_exists == 'true'
        # Seguridad: Excluimos dependencias dev (como PHPUnit) del servidor de producción
        run: composer validate --no-check-publish && composer install --prefer-dist --no-progress --no-dev --optimize-autoloader

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: .

  # ==========================================
  # 3. DESPLIEGUE EN AZURE
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
      
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/y2api
            
            # Descargar los últimos cambios
            git pull origin main
            
            # Instalar nuevas dependencias si las hay
            composer install --no-interaction --prefer-dist --optimize-autoloader
            
            # Limpiar y reconstruir caché de Laravel
            php artisan config:cache
            php artisan route:cache
            
            # Reiniciar las colas para que yt-dlp y ffmpeg usen el nuevo código
            sudo supervisorctl restart y2api-worker:*